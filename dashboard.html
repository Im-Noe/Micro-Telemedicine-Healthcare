<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTH — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body data-role="pasien">

<!-- ══════════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="12" fill="white" fill-opacity="0.18"/><path d="M20 8v24M8 20h24" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="20" cy="20" r="5" fill="white" fill-opacity="0.25"/></svg>
      </div>
      <div>
        <span class="brand-name">MTH</span>
        <span class="brand-sub">Telemedicine</span>
      </div>
    </div>
    <button class="sidebar-close" id="sidebar-close" aria-label="Tutup menu">
      <svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- Role switcher (demo) -->
  <div class="role-switcher">
    <button class="rs-btn active" data-role="pasien">👤 Pasien</button>
    <button class="rs-btn" data-role="dokter">👨‍⚕️ Dokter</button>
    <button class="rs-btn" data-role="admin">⚙️ Admin</button>
  </div>

  <nav class="sidebar-nav" id="sidebar-nav">
    <!-- nav items injected by JS per role -->
  </nav>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="nav-avatar">A</div>
      <div class="user-info">
        <span class="user-name" id="nav-name">Ahmad Fauzan</span>
        <span class="user-role" id="nav-role">Pasien</span>
      </div>
      <button class="logout-btn" id="logout-btn" title="Keluar">
        <svg viewBox="0 0 20 20" fill="none"><path d="M13 10H3m0 0l3-3m-3 3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 6V4a1 1 0 011-1h6a1 1 0 011 1v12a1 1 0 01-1 1H9a1 1 0 01-1-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- Overlay mobile -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ══════════════════════════════════════════════
     MAIN
══════════════════════════════════════════════ -->
<div class="main-wrapper">

  <!-- TOP BAR -->
  <header class="topbar">
    <button class="hamburger" id="hamburger" aria-label="Buka menu">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <button class="icon-btn notif-btn" id="notif-btn" aria-label="Notifikasi">
        <svg viewBox="0 0 20 20" fill="none"><path d="M10 2a6 6 0 00-6 6v2.586l-1.707 1.707A1 1 0 003 14h14a1 1 0 00.707-1.707L16 10.586V8a6 6 0 00-6-6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 14a2 2 0 004 0" stroke="currentColor" stroke-width="1.5"/></svg>
        <span class="notif-badge" id="notif-badge">3</span>
      </button>
      <div class="topbar-avatar" id="topbar-avatar">A</div>
    </div>
  </header>

  <!-- CONTENT AREA -->
  <main class="content" id="content">
    <!-- Pages injected by JS -->
  </main>

</div><!-- /main-wrapper -->

<!-- ══════════════════════════════════════════════
     NOTIFICATION PANEL
══════════════════════════════════════════════ -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-panel-header">
    <span>Notifikasi</span>
    <button class="notif-clear" id="notif-clear">Tandai semua dibaca</button>
  </div>
  <div class="notif-list" id="notif-list"></div>
</div>
<div class="notif-overlay" id="notif-overlay"></div>

<!-- MODAL CONTAINER -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title"></h3>
      <button class="modal-close" id="modal-close">
        <svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✓</span>
  <span class="toast-msg" id="toast-msg"></span>
</div>

<script src="dashboard.js"></script>
</body>
</html>
